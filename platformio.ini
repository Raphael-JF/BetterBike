; https://docs.platformio.org/page/projectconf.html

[env:uno]
lib_deps =
    seeed-studio/Grove - LCD RGB Backlight@^1.0.2
    seeed-studio/Grove 3-Axis Digital Compass HMC5883L@^1.0.1
build_src_filter = +<*> -<lcd_sim.cpp>
platform = atmelavr
board = uno
framework = arduino
